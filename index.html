<!DOCTYPE html>
<html lang="ms">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics MPU3221 - Live Data</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; min-height: 100vh; color: white; }
    .abstract-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 10% 20%, #1e3a8a 0%, transparent 40%), radial-gradient(circle at 90% 80%, #581c87 0%, transparent 40%), radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%); }
    .blob { position: absolute; width: 600px; height: 600px; background: linear-gradient(135deg, #3b82f6 0%, #a855f7 100%); filter: blur(100px); border-radius: 50%; opacity: 0.1; animation: move 25s infinite alternate ease-in-out; }
    @keyframes move { 0% { transform: translate(-15%, -15%) rotate(0deg) scale(1); } 100% { transform: translate(25%, 25%) rotate(360deg) scale(1.2); } }
    .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; }
    .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
    .glass-card:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-4px); }
    .text-glow { text-shadow: 0 0 15px rgba(59, 130, 246, 0.6); }
    .loading-overlay { background: #0f172a; display: flex; flex-direction: column; justify-content: center; align-items: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; }
  </style>
</head>
<body>

  <div class="abstract-bg"><div class="blob"></div></div>

  <div id="loading" class="loading-overlay">
    <div class="w-16 h-16 border-4 border-t-blue-500 border-blue-500/10 rounded-full animate-spin mb-4"></div>
    <div id="loading-text" class="text-xs font-black tracking-widest text-blue-400 uppercase">Menghubungkan Data...</div>
  </div>

  <nav class="sticky top-0 z-40 px-8 py-5 bg-[#0f172a]/80 backdrop-blur-xl border-b border-white/5">
    <div class="container mx-auto flex justify-between items-center">
      <div class="flex items-center gap-4">
        <h1 class="text-xl font-extrabold tracking-tighter uppercase">MPU3221 <span class="text-blue-500">Analytics</span></h1>
      </div>
      <div class="flex items-center gap-4">
        <div class="text-right">
          <div id="status-text" class="text-[10px] font-black text-blue-300 uppercase">Menunggu...</div>
          <div id="stat-count" class="text-[9px] opacity-40">0 Rekod</div>
        </div>
        <button onclick="loadData()" class="p-2 glass rounded-xl hover:bg-white/10 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        </button>
      </div>
    </div>
  </nav>

  <main class="container mx-auto px-6 py-10">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-10">
      <div class="lg:col-span-2 glass p-8">
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-xs font-black uppercase text-blue-400">Taburan Gred</h3>
          <select id="filterKelas" onchange="loadData()" class="bg-white/5 border-0 text-[10px] rounded-lg px-4 py-2 outline-none">
            <option value="Semua">Semua Kelas</option>
          </select>
        </div>
        <div class="h-64"><canvas id="gradeChart"></canvas></div>
      </div>
      <div class="glass p-8 flex flex-col justify-center items-center">
        <h3 class="text-xs font-black uppercase text-blue-400 mb-4">Purata Markah</h3>
        <div id="avg-mark" class="text-8xl font-black text-glow">0.0</div>
      </div>
    </div>

    <div class="glass overflow-hidden">
      <div class="p-6 border-b border-white/5 bg-white/5">
        <h2 class="text-xs font-black uppercase tracking-widest">Senarai Pelajar</h2>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead>
            <tr class="text-[10px] uppercase text-white/30 border-b border-white/5">
              <th class="p-6">Nama & Maklumat</th>
              <th class="p-6 text-center">HP1</th>
              <th class="p-6 text-center">HP5</th>
              <th class="p-6 text-center">Jumlah</th>
              <th class="p-6 text-center">Gred</th>
              <th class="p-6 text-center">Tindakan</th>
            </tr>
          </thead>
          <tbody id="student-list" class="divide-y divide-white/5"></tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-50 p-4">
    <div class="glass w-full max-w-lg p-10">
      <h2 id="modal-name" class="text-2xl font-black uppercase mb-2">Nama Pelajar</h2>
      <p class="text-xs text-blue-400 font-bold mb-8 uppercase">Kemas Kini Markah</p>
      
      <div class="grid grid-cols-2 gap-4 mb-8">
        <div>
          <label class="text-[10px] uppercase opacity-50 block mb-2">HP1 (30)</label>
          <input type="number" id="inp-hp1" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 outline-none focus:border-blue-500">
        </div>
        <div>
          <label class="text-[10px] uppercase opacity-50 block mb-2">HP5 (10)</label>
          <input type="number" id="inp-hp5" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 outline-none focus:border-blue-500">
        </div>
        <div>
          <label class="text-[10px] uppercase opacity-50 block mb-2">T2-KUMP (30)</label>
          <input type="number" id="inp-t2k" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 outline-none focus:border-blue-500">
        </div>
        <div>
          <label class="text-[10px] uppercase opacity-50 block mb-2">T2-INDT (30)</label>
          <input type="number" id="inp-t2i" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 outline-none focus:border-blue-500">
        </div>
      </div>
      
      <div class="flex gap-3">
        <button onclick="closeModal()" class="flex-1 py-4 rounded-xl font-bold uppercase text-xs bg-white/5">Batal</button>
        <button onclick="saveMarks()" class="flex-[2] py-4 rounded-xl font-bold uppercase text-xs bg-blue-600 shadow-lg shadow-blue-500/20">Simpan Data</button>
      </div>
    </div>
  </div>

  <script>
    // GANTIKAN URL DI BAWAH DENGAN URL WEB APP ANDA
    const API_URL = "https://script.google.com/macros/s/AKfycbx6dRVWEHcv7N73dUv-w9KsmUofdvAWr5QvkABj_jL-MiMvi7lbX6-S9qvxhBsmhklC/exec";

    let currentData = [];
    let myChart = null;
    let selectedIndex = null;

    async function loadData() {
      showLoading(true, "Menarik Data...");
      const kelas = document.getElementById('filterKelas').value;
      
      try {
        const response = await fetch(`${API_URL}?action=read&kelas=${kelas}`);
        const data = await response.json();
        renderTable(data.rows);
        updateStatus("Live (Connected)", "text-green-400");
        
        // Load classes once
        if (document.getElementById('filterKelas').options.length <= 1) {
          const resClasses = await fetch(`${API_URL}?action=getClasses`);
          const classesData = await resClasses.json();
          populateClasses(classesData.classes);
        }
      } catch (e) {
        updateStatus("Connection Error", "text-red-400");
      }
      showLoading(false);
    }

    function renderTable(rows) {
      currentData = rows;
      const list = document.getElementById('student-list');
      list.innerHTML = "";
      let totalMark = 0;
      let grades = { A:0, B:0, C:0, Lain:0 };

      rows.forEach((row, idx) => {
        const hp1 = Number(row[5]) || 0;
        const hp5 = Number(row[6]) || 0;
        const t2k = Number(row[8]) || 0;
        const t2i = Number(row[9]) || 0;
        const total = Number(row[11]) || 0;
        const gred = String(row[12] || '-').trim();

        totalMark += total;
        if(gred.startsWith('A')) grades.A++;
        else if(gred.startsWith('B')) grades.B++;
        else if(gred.startsWith('C')) grades.C++;
        else grades.Lain++;

        list.innerHTML += `
          <tr class="hover:bg-white/[0.02]">
            <td class="p-6">
              <div class="font-bold text-sm uppercase">${row[1]}</div>
              <div class="text-[9px] text-blue-400 uppercase tracking-tighter">${row[3]} | ${row[4]}</div>
            </td>
            <td class="p-6 text-center opacity-60 text-xs">${hp1.toFixed(1)}</td>
            <td class="p-6 text-center opacity-60 text-xs">${hp5.toFixed(1)}</td>
            <td class="p-6 text-center font-black text-lg text-blue-400">${total.toFixed(1)}</td>
            <td class="p-6 text-center">
              <span class="px-3 py-1 rounded-lg text-[10px] font-black border ${getGredColor(gred)}">${gred}</span>
            </td>
            <td class="p-6 text-center">
              <button onclick="openModal(${idx})" class="text-[10px] font-black uppercase text-blue-400 hover:text-white transition">Edit</button>
            </td>
          </tr>
        `;
      });

      document.getElementById('stat-count').innerText = `${rows.length} Pelajar`;
      document.getElementById('avg-mark').innerText = rows.length ? (totalMark / rows.length).toFixed(1) : "0.0";
      updateChart(grades);
    }

    async function saveMarks() {
      const marks = {
        hp1: document.getElementById('inp-hp1').value,
        hp5: document.getElementById('inp-hp5').value,
        t2kump: document.getElementById('inp-t2k').value,
        t2indt: document.getElementById('inp-t2i').value
      };
      
      const bilID = currentData[selectedIndex][0];
      showLoading(true, "Menyimpan ke Cloud...");

      try {
        await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'update', index: bilID, marks: marks })
        });
        
        // Beri masa 2 saat untuk Google Sheets proses formula sebelum refresh
        setTimeout(() => {
          closeModal();
          loadData();
        }, 2000);
      } catch (e) {
        alert("Gagal simpan. Sila cuba lagi.");
        showLoading(false);
      }
    }

    function openModal(idx) {
      selectedIndex = idx;
      const r = currentData[idx];
      document.getElementById('modal-name').innerText = r[1];
      document.getElementById('inp-hp1').value = r[5];
      document.getElementById('inp-hp5').value = r[6];
      document.getElementById('inp-t2k').value = r[8];
      document.getElementById('inp-t2i').value = r[9];
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    function getGredColor(g) {
      if(g.startsWith('A')) return 'text-green-400 border-green-500/30 bg-green-500/10';
      if(g.startsWith('B')) return 'text-blue-400 border-blue-500/30 bg-blue-500/10';
      return 'text-red-400 border-red-500/30 bg-red-500/10';
    }

    function showLoading(show, text = "") {
      document.getElementById('loading').style.display = show ? 'flex' : 'none';
      if(text) document.getElementById('loading-text').innerText = text;
    }

    function updateStatus(txt, cls) {
      const el = document.getElementById('status-text');
      el.innerText = txt;
      el.className = `text-[10px] font-black uppercase ${cls}`;
    }

    function populateClasses(classes) {
      const sel = document.getElementById('filterKelas');
      classes.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.innerText = c;
        sel.appendChild(opt);
      });
    }

    function updateChart(data) {
      const ctx = document.getElementById('gradeChart').getContext('2d');
      if(myChart) myChart.destroy();
      myChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['A', 'B', 'C', 'Lain'],
          datasets: [{
            data: [data.A, data.B, data.C, data.Lain],
            backgroundColor: ['#22c55e', '#3b82f6', '#eab308', '#ef4444'],
            borderRadius: 8
          }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } } } }
      });
    }

    document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
