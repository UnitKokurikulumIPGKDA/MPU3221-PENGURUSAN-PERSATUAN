<!DOCTYPE html>
<html lang="ms">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MPU3221 Analytics - Statistik Markah Keseluruhan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #070b14; min-height: 100vh; color: white; }
    .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; }
    .text-glow { text-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
    .loading-overlay { background: #070b14; display: flex; flex-direction: column; justify-content: center; align-items: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; }
  </style>
</head>
<body>

  <div id="loading" class="loading-overlay">
    <div class="w-12 h-12 border-4 border-t-blue-500 border-blue-500/10 rounded-full animate-spin mb-4"></div>
    <div class="text-[10px] font-black tracking-[0.3em] text-blue-400 uppercase">Mengira Statistik Markah...</div>
  </div>

  <nav class="sticky top-0 z-40 px-8 py-5 bg-[#070b14]/80 backdrop-blur-xl border-b border-white/5">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-xl font-extrabold tracking-tighter uppercase italic">MPU3221 <span class="text-blue-500">Analytics</span></h1>
      <div class="flex items-center gap-4">
        <select id="filterKelas" onchange="loadData()" class="bg-white/5 border border-white/10 text-[10px] font-bold rounded-lg px-4 py-2 outline-none">
          <option value="Semua">Semua Kelas</option>
        </select>
        <button onclick="loadData()" class="p-2 glass hover:bg-white/10 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <main class="container mx-auto px-6 py-8">
    
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      <div class="glass p-6 border-l-4 border-blue-500">
        <div class="text-[9px] uppercase font-black opacity-40 mb-1">Min (Markah Purata)</div>
        <div id="stat-mean" class="text-3xl font-black text-blue-400">0.0</div>
      </div>
      <div class="glass p-6 border-l-4 border-purple-500">
        <div class="text-[9px] uppercase font-black opacity-40 mb-1">Mod (Markah Kerap)</div>
        <div id="stat-mode" class="text-3xl font-black text-purple-400">0.0</div>
      </div>
      <div class="glass p-6 border-l-4 border-green-500">
        <div class="text-[9px] uppercase font-black opacity-40 mb-1">Sisihan Piawai (SD)</div>
        <div id="stat-sd" class="text-3xl font-black text-green-400">0.0</div>
      </div>
      <div class="glass p-6 border-l-4 border-white">
        <div class="text-[9px] uppercase font-black opacity-40 mb-1">Jumlah Pelajar</div>
        <div id="stat-count" class="text-3xl font-black text-white">0</div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
      <div class="glass p-8">
        <h3 class="text-[10px] font-black uppercase text-blue-400 mb-6 tracking-widest">Taburan Normal (Bell Curve)</h3>
        <div class="h-64"><canvas id="bellCurveChart"></canvas></div>
      </div>
      <div class="glass p-8">
        <h3 class="text-[10px] font-black uppercase text-blue-400 mb-6 tracking-widest">Statistik Gred (Bilangan)</h3>
        <div class="h-64"><canvas id="gradeChart"></canvas></div>
      </div>
    </div>

    

    <div class="glass overflow-hidden">
      <div class="p-6 border-b border-white/5 bg-white/5 flex flex-col md:flex-row justify-between items-center gap-4">
        <h2 class="text-xs font-black uppercase tracking-widest">Pangkalan Data Calon</h2>
        <input type="text" id="searchName" onkeyup="filterTable()" placeholder="Cari nama pelajar..." class="w-full md:w-64 bg-black/20 border border-white/10 rounded-xl px-4 py-2 text-xs outline-none focus:border-blue-500 transition">
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead class="text-[10px] uppercase text-white/30 border-b border-white/5">
            <tr>
              <th class="p-6">Nama Pelajar</th>
              <th class="p-6 text-center">Markah Keseluruhan</th>
              <th class="p-6 text-center">Gred</th>
              <th class="p-6 text-center">Aksi</th>
            </tr>
          </thead>
          <tbody id="student-list" class="divide-y divide-white/5"></tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="modal" class="hidden fixed inset-0 bg-black/95 backdrop-blur-md flex items-center justify-center z-50 p-4">
    <div class="glass w-full max-w-md p-10">
      <h2 id="modal-name" class="text-xl font-black uppercase mb-8">Kemas Kini Markah</h2>
      <div class="grid grid-cols-2 gap-4 mb-8">
        <input type="number" id="inp-hp1" placeholder="HP1 (30)" class="bg-white/5 p-4 rounded-xl border border-white/10 outline-none focus:border-blue-500">
        <input type="number" id="inp-hp5" placeholder="HP5 (10)" class="bg-white/5 p-4 rounded-xl border border-white/10 outline-none focus:border-blue-500">
        <input type="number" id="inp-t2k" placeholder="T2-KUMP (30)" class="bg-white/5 p-4 rounded-xl border border-white/10 outline-none focus:border-blue-500">
        <input type="number" id="inp-t2i" placeholder="T2-INDT (30)" class="bg-white/5 p-4 rounded-xl border border-white/10 outline-none focus:border-blue-500">
      </div>
      <div class="flex gap-4">
        <button onclick="closeModal()" class="flex-1 py-3 font-bold opacity-50 uppercase text-xs">Batal</button>
        <button onclick="saveMarks()" class="flex-[2] py-3 bg-blue-600 rounded-xl font-bold uppercase text-xs shadow-lg shadow-blue-500/30">Sahkan</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx6dRVWEHcv7N73dUv-w9KsmUofdvAWr5QvkABj_jL-MiMvi7lbX6-S9qvxhBsmhklC/exec";
    let currentData = [], gradeChart = null, bellChart = null, selectedIndex = null;

    async function loadData() {
      document.getElementById('loading').style.display = 'flex';
      const kelas = document.getElementById('filterKelas').value;
      try {
        const response = await fetch(`${API_URL}?action=read&kelas=${kelas}`);
        const data = await response.json();
        currentData = data.rows;
        
        calculateDetailedStats(currentData);
        renderTable(currentData);
        
        if (document.getElementById('filterKelas').options.length <= 1) {
          const resClasses = await fetch(`${API_URL}?action=getClasses`);
          const classesData = await resClasses.json();
          classesData.classes.forEach(c => {
            let opt = document.createElement('option'); opt.value = c; opt.innerText = c;
            document.getElementById('filterKelas').appendChild(opt);
          });
        }
      } catch (e) { console.error("Error loading data:", e); }
      document.getElementById('loading').style.display = 'none';
    }

    function calculateDetailedStats(rows) {
      if (!rows.length) return;
      
      // Ambil markah keseluruhan (Kolum L / Index 11)
      const allMarks = rows.map(r => Number(r[11]) || 0).sort((a,b) => a-b);
      
      // 1. Kira Min (Mean)
      const mean = allMarks.reduce((a, b) => a + b, 0) / allMarks.length;
      
      // 2. Kira Sisihan Piawai (Standard Deviation) - Berdasarkan Markah
      const variance = allMarks.map(x => Math.pow(x - mean, 2)).reduce((a, b) => a + b) / allMarks.length;
      const sd = Math.sqrt(variance);
      
      // 3. Kira Mod (Mode) - Markah paling kerap muncul
      const freqMap = {};
      allMarks.forEach(m => freqMap[m] = (freqMap[m] || 0) + 1);
      let maxFreq = 0, mode = allMarks[0];
      for (let m in freqMap) { if (freqMap[m] > maxFreq) { maxFreq = freqMap[m]; mode = m; } }

      document.getElementById('stat-mean').innerText = mean.toFixed(1);
      document.getElementById('stat-sd').innerText = sd.toFixed(2);
      document.getElementById('stat-mode').innerText = Number(mode).toFixed(1);
      document.getElementById('stat-count').innerText = rows.length;

      drawBellCurve(mean, sd, allMarks);
    }

    function drawBellCurve(mean, sd, marks) {
      const ctx = document.getElementById('bellCurveChart').getContext('2d');
      if (bellChart) bellChart.destroy();

      const points = [];
      // Jana lengkungan dari 0 ke 100 markah
      for (let x = 0; x <= 100; x += 1) {
        const exponent = -0.5 * Math.pow((x - mean) / sd, 2);
        const y = (1 / (sd * Math.sqrt(2 * Math.PI))) * Math.exp(exponent);
        points.push({x, y});
      }

      bellChart = new Chart(ctx, {
        type: 'scatter',
        data: {
          datasets: [{
            label: 'Taburan Markah',
            data: points,
            showLine: true,
            borderColor: '#3b82f6',
            backgroundColor: 'rgba(59, 130, 246, 0.1)',
            fill: true,
            pointRadius: 0,
            borderWidth: 3,
            tension: 0.4
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { 
            legend: { display: false },
            tooltip: { enabled: false }
          },
          scales: {
            x: { 
              min: 0, max: 100,
              grid: { color: 'rgba(255,255,255,0.05)' },
              ticks: { color: '#666', font: { size: 10 } },
              title: { display: true, text: 'Markah Keseluruhan', color: '#444', font: { size: 10 } }
            },
            y: { display: false }
          }
        }
      });
    }

    function renderTable(rows) {
      const list = document.getElementById('student-list');
      list.innerHTML = "";
      let gCounts = { A:0, B:0, C:0, Lain:0 };

      rows.forEach((row, idx) => {
        const total = Number(row[11]) || 0;
        const gred = String(row[12] || '-').trim();
        if(gred.startsWith('A')) gCounts.A++; else if(gred.startsWith('B')) gCounts.B++; else if(gred.startsWith('C')) gCounts.C++; else gCounts.Lain++;

        list.innerHTML += `
          <tr class="hover:bg-white/[0.02] transition-all">
            <td class="p-6">
              <div class="text-sm font-bold uppercase tracking-tight">${row[1]}</div>
              <div class="text-[9px] text-blue-400 font-bold uppercase opacity-50">${row[3]} | ${row[4]}</div>
            </td>
            <td class="p-6 text-center font-black text-xl text-glow">${total.toFixed(1)}</td>
            <td class="p-6 text-center">
              <span class="px-3 py-1 rounded-lg text-[9px] font-black border ${gred.startsWith('A') ? 'text-green-400 border-green-500/20 bg-green-500/5' : 'text-blue-400 border-blue-500/20 bg-blue-500/5'}">${gred}</span>
            </td>
            <td class="p-6 text-center">
              <button onclick="openModal(${idx})" class="px-4 py-2 glass rounded-xl text-[9px] font-black uppercase hover:bg-white/10 transition">Edit</button>
            </td>
          </tr>
        `;
      });
      updateGradeChart(gCounts);
    }

    function updateGradeChart(data) {
      const ctx = document.getElementById('gradeChart').getContext('2d');
      if (gradeChart) gradeChart.destroy();
      gradeChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['A', 'B', 'C', 'Lain'],
          datasets: [{ data: [data.A, data.B, data.C, data.Lain], backgroundColor: ['#22c55e', '#3b82f6', '#eab308', '#ef4444'], borderRadius: 12 }]
        },
        options: { 
          responsive: true, maintainAspectRatio: false, 
          plugins: { legend: { display: false } },
          scales: { 
            y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { stepSize: 1, color: '#444' } },
            x: { grid: { display: false }, ticks: { color: '#666' } }
          }
        }
      });
    }

    function filterTable() {
      const q = document.getElementById('searchName').value.toUpperCase();
      const filtered = currentData.filter(r => String(r[1]).toUpperCase().includes(q));
      renderTable(filtered);
    }

    function openModal(idx) {
      selectedIndex = idx; const r = currentData[idx];
      document.getElementById('modal-name').innerText = r[1];
      document.getElementById('inp-hp1').value = r[5]; document.getElementById('inp-hp5').value = r[6];
      document.getElementById('inp-t2k').value = r[8]; document.getElementById('inp-t2i').value = r[9];
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    async function saveMarks() {
      const marks = { hp1: document.getElementById('inp-hp1').value, hp5: document.getElementById('inp-hp5').value, t2kump: document.getElementById('inp-t2k').value, t2indt: document.getElementById('inp-t2i').value };
      const realIndex = currentData[selectedIndex][0];
      document.getElementById('loading').style.display = 'flex';
      try {
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'update', index: realIndex, marks }) });
        setTimeout(() => { closeModal(); loadData(); }, 1500);
      } catch (e) { alert("Ralat!"); document.getElementById('loading').style.display = 'none'; }
    }

    document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
